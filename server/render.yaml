# Render Blueprint for the Stackpilot backend.
# Create the service: Render Dashboard -> New -> Blueprint -> select this repo.
# Secrets are marked `sync: false` so Render prompts you to enter them securely
# in the dashboard (they are NOT stored in this file / git).
services:
  - type: web
    name: stackpilot-server
    runtime: node
    region: oregon
    plan: free
    rootDir: server
    buildCommand: npm install --legacy-peer-deps && npm run build
    startCommand: npm start
    # Must be a 200 route — `/api` returns 404 (routes are mounted UNDER it), which
    # makes Render's health check fail and the deploy "Time Out". `/health` is 200.
    healthCheckPath: /health
    envVars:
      # ── Build / runtime ──────────────────────────────────────────────
      - key: NODE_VERSION
        value: "22.16.0"
      - key: NPM_CONFIG_PRODUCTION
        value: "false"
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"

      # ── CORS: set to your deployed frontend URL ──────────────────────
      - key: CORS_ORIGIN
        sync: false

      # ── Auth + encryption (secrets) ──────────────────────────────────
      - key: TOKEN_HMAC_SECRET
        generateValue: true
      - key: TOKEN_EXPIRES_DAYS
        value: "7"
      - key: ENCRYPTION_MASTER_KEY
        sync: false

      # ── Agent wallet (Stacks) ────────────────────────────────────────
      - key: STACKS_NETWORK
        value: testnet
      - key: HIRO_API
        value: https://api.testnet.hiro.so
      - key: PROTOCOL_ID
        value: bitflow-amm
      # Deployed agent-policy contract id: ST<deployer>.agent-policy
      - key: STACKS_CONTRACT
        sync: false
      # The agent's own Stacks private key (hex) so the server signs as that agent.
      - key: AGENT_IMPORT_KEY
        sync: false

      # ── NL intent engine (optional — regex fallback if unset) ────────
      - key: GEMINI_API_KEY
        sync: false
      - key: LLM_MODEL
        value: gemini-2.5-flash

      # ── Auto-DCA safety cap ──────────────────────────────────────────
      - key: DCA_MAX_RUNS
        value: "24"
