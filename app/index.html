<!doctype html>
<html lang="en" class="dark">

<head>
  <meta charset="UTF-8" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,200..1000;1,200..1000&display=swap" rel="stylesheet">
  <!-- Stackpilot cockpit fonts + icons (Stitch design system) -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" rel="stylesheet">
  <link rel="icon" type="image/svg+xml" href="/assets/stackpilot-mark.svg" />
  <link rel="apple-touch-icon" sizes="180x180" href="/assets/stackpilot-mark.svg" />
  <link rel="manifest" href="/site.webmanifest" />
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />

  <!-- Telegram Web App SDKs -->


  <title>Stackpilot</title>

  <!-- Basic SEO -->
  <meta name="description" content="Your autonomous agent for on-chain trading on Stacks — enforced on-chain." />
  <meta name="keywords"
    content="Stackpilot, crypto AI, Stacks blockchain, crypto trading, token research, NFT insights, sentiment analysis, crypto notifications, wallet intelligence" />
  <meta name="robots" content="index, follow" />
  <meta name="theme-color" content="#0D0D0D" />
  <meta name="referrer" content="strict-origin-when-cross-origin" />
  <meta name="google-site-verification" content="YOUR_GOOGLE_SITE_VERIFICATION_CODE" />
  <meta name="msvalidate.01" content="YOUR_BING_SITE_VERIFICATION_CODE" />

  <!-- Open Graph (Facebook, LinkedIn, WhatsApp) -->
  <meta property="og:locale" content="en_US" />
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Stackpilot | Autonomous on-chain trading agent" />
  <meta property="og:description"
    content="Your autonomous agent for on-chain trading on Stacks — enforced on-chain." />
  <meta property="og:url" content="https://stackpilot.app" />
  <meta property="og:site_name" content="Stackpilot" />

  <!-- Primary OG image  -->
  <meta property="og:image" content="/og-preview.png" />
  <meta property="og:image:alt" content="Stackpilot app interface showcasing smarter crypto workflows" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />

  <!-- Fallback OG image -->
  <meta property="og:image" content="/og-preview.png" />
  <meta property="og:image:alt" content="Stackpilot app interface showcasing smarter crypto workflows (small)" />
  <meta property="og:image:width" content="300" />
  <meta property="og:image:height" content="200" />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:site" content="@stackpilot" />
  <meta name="twitter:title" content="Stackpilot | Autonomous on-chain trading agent" />
  <meta name="twitter:description"
    content="Your autonomous agent for on-chain trading on Stacks — enforced on-chain." />
  <meta name="twitter:image" content="/og-preview.png" />
  <meta name="twitter:image:alt" content="Stackpilot app interface showcasing smarter crypto workflows" />

  <!-- Canonical URL -->
  <link rel="canonical" href="https://stackpilot.app" />

  <!-- Structured Data -->
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Stackpilot",
      "url": "https://stackpilot.app",
      "logo": "https://stackpilot.app/assets/stackpilot-mark.svg",
      "sameAs": [
        "https://x.com/stackpilot"
      ],
      "description": "Your autonomous agent for on-chain trading on Stacks — enforced on-chain. Autonomous on-chain trading agent on Stacks blockchain."
    }
    </script>
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Stackpilot",
      "url": "https://stackpilot.app",
      "description": "Your autonomous agent for on-chain trading on Stacks — enforced on-chain. Autonomous on-chain trading agent on Stacks blockchain.",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://stackpilot.app/search?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Product",
      "name": "Stackpilot",
      "image": "/og-preview.png",
      "description": "Your autonomous agent for on-chain trading on Stacks — enforced on-chain. Autonomous on-chain trading agent on Stacks blockchain.",
      "brand": {
        "@type": "Brand",
        "name": "Stackpilot"
      },
      "offers": {
        "@type": "Offer",
        "availability": "https://schema.org/PreOrder",
        "url": "https://stackpilot.app",
        "price": "0",
        "priceCurrency": "USD"
      }
    }
    </script>
</head>

<body>
  <noscript>
    <div style="padding: 20px; text-align: center;">
      <h1>Stackpilot | Autonomous on-chain trading agent</h1>
      <p>Enable JavaScript to access Stackpilot's features. Follow us on <a href="https://x.com/stackpilot">X</a> for
        updates.</p>
      <p>Join our waitlist: <a href="mailto:hello@stackpilot.app">hello@stackpilot.app</a></p>
    </div>
  </noscript>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js')
          .then((registration) => {
            console.log('SW registered: ', registration);
          })
          .catch((error) => {
            console.log('SW registration failed: ');
          });
      });
    }
  </script>
</body>

</html>
